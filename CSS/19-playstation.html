<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./19-playstation.css">
    <title>Playstation Store</title>
</head>

<body>
    <div class="container">
        <div class="navbar">
            <img class="logo" src="./../img/logo.png" alt="logo">
            <nav>
                <ul>
                    <li><a class="nav-link">Consoles</a></li>
                    <li><a class="nav-link">Acessórios</a></li>
                    <li><a class="nav-link">Controles</a></li>
                    <li><a class="nav-link">Outros</a></li>
                </ul>
            </nav>
        </div>


        <div class="row">
            <div class="column-1">
                <h2>PS5 Dualshok</h2>
                <h3>Wireless Controller for PlayStation</h3>
                <p>Controle Original</p>
                <h4>R$ 222,50</h4>
                <button class="buy">Comprar agora</button>
            </div>

            <div class="column-2">
                <img class="controller" src="./../img/controller.png" alt="controle">
                <div class="color-box"></div>
                <button class="add-cart">
                    <img src="./../img/add.png" alt="adicionar-ao-carrinho">
                </button>
            </div>
        </div>

       <div class="social-links">
            <br>
           <i class="fa-brands fa-facebook-f" style="color: #3d5b9b;"></i>
           <i class="fa-brands fa-square-instagram" style="color: #833ab4;"></i>
           <i class="fa-brands fa-twitter" style="color: #1da1f2;"></i>
         </div>

    </div>
</body>

</html>
